name: Bug report
description: Report a problem with the dotenv package
labels: ["bug"]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction
      description: A minimal .env snippet and Go code that reproduces the issue.
      render: go
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Package version
      placeholder: v2.0.0
    validations:
      required: true
  - type: input
    id: goversion
    attributes:
      label: Go version (go version)
      placeholder: go1.23.0 linux/amd64
    validations:
      required: true
